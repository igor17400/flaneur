# @package _global_
# embed_dim 128, n_layers 4, no dropout, lighter L2 reg (1e-5),
# batch_size 2048→8192 for ~4x faster epochs, 100 epochs. Xavier init in code.

wandb:
  project: flaneur
  enabled: true
  run_name: lgcn_gowalla_full

model:
  embed_dim: 128
  n_layers: 4
  embed_dropout: 0.0

data:
  name: gowalla
  data_dir: data/gowalla

train:
  lr: 1e-3
  reg_weight: 1e-5
  batch_size: 8192
  epochs: 100
  topk: 20
  eval_every: 5
  seed: 2020
  patience: 0
