# @package _global_
# Training best two models (dim=128, dim=256) for 100 epochs.
# Base: 4-layer, lr=1e-3, reg=1e-5, n_negatives=3.

wandb:
  project: flaneur
  enabled: true
  run_name: lgcn_gowalla_full

model:
  embed_dim: 128
  n_layers: 4
  embed_dropout: 0.0

data:
  name: gowalla
  data_dir: data/gowalla

train:
  lr: 1e-3
  reg_weight: 1e-5
  batch_size: 2048
  epochs: 100
  topk: 20
  eval_every: 5
  seed: 2020
  patience: 0
  n_negatives: 3
