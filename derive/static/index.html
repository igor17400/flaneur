<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Derive — Where Will They Go Next?</title>

  <!-- MapLibre + deck.gl -->
  <script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"></script>
  <link  href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/deck.gl@9.0.16/dist.min.js"></script>

  <!-- Chart.js, html2canvas, jsPDF -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>

  <!-- App styles -->
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<div id="map"></div>

<!-- ── Left Sidebar ──────────────────────────────────────── -->
<div class="sidebar">
  <div class="logo">
    <h1>Derive</h1>
    <p>LightGCN &middot; Gowalla</p>
  </div>

  <div class="search-box">
    <div class="search-row">
      <input type="text" id="search-input" placeholder="User ID (0 – 29857)" />
      <button class="search-btn" onclick="searchUser()">Go</button>
      <button class="search-btn" onclick="randomUser()">&#x1F3B2;</button>
    </div>
    <div class="search-error" id="search-error"></div>
  </div>

  <!-- Model selector -->
  <div class="section-hdr">Model</div>
  <div class="model-selector">
    <select id="model-select"></select>
    <div class="model-info" id="model-info"></div>
  </div>

  <div class="section-hdr">Overview</div>
  <div class="stats-grid">
    <div class="stat-box">
      <div class="val" id="stat-history" style="color:#60a5fa">&mdash;</div>
      <div class="lbl">History</div>
    </div>
    <div class="stat-box">
      <div class="val" id="stat-gt" style="color:#f59e0b">&mdash;</div>
      <div class="lbl">Test set</div>
    </div>
    <div class="stat-box">
      <div class="val" id="stat-pred" style="color:#10b981">&mdash;</div>
      <div class="lbl">Preds</div>
    </div>
    <div class="stat-box">
      <div class="val" id="stat-spread">&mdash;</div>
      <div class="lbl">Spread</div>
    </div>
  </div>

  <div class="section-hdr">Recent</div>
  <div class="recent-wrap" id="recent-chips"></div>

  <div class="section-hdr">Timeline</div>
  <div class="timeline-wrap" id="timeline"></div>
</div>

<!-- ── Legend ─────────────────────────────────────────────── -->
<div class="legend">
  <div class="legend-item">
    <div class="legend-dot" style="background:#60a5fa"></div>
    History (train)
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#f59e0b; box-shadow: 0 0 6px #f59e0b"></div>
    Ground truth (test)
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#10b981; box-shadow: 0 0 6px #10b981"></div>
    Predictions (model)
  </div>
  <div class="legend-item">
    <div class="legend-line" style="background: rgba(96,165,250,0.5)"></div>
    Path
  </div>
</div>

<!-- ── Controls ──────────────────────────────────────────── -->
<div class="controls">
  <button class="btn" id="btn-animate" onclick="toggleAnimation()">Animate</button>
  <button class="btn" onclick="showAll()">Show All</button>
  <button class="btn" onclick="fitBounds()">Fit View</button>
  <button class="btn btn-report" onclick="openReport()">Report</button>
  <button class="btn btn-compare" onclick="openCompare()">Compare</button>
  <button class="btn btn-heatmap-history" id="btn-heatmap-history" onclick="toggleCategoryHeatmap('history')">Heat: History</button>
  <button class="btn btn-heatmap-gt" id="btn-heatmap-gt" onclick="toggleCategoryHeatmap('ground_truth')">Heat: Truth</button>
  <button class="btn btn-heatmap-pred" id="btn-heatmap-pred" onclick="toggleCategoryHeatmap('predictions')">Heat: Preds</button>
  <button class="btn btn-leaderboard" onclick="openLeaderboard()">Leaderboard</button>
  <button class="btn btn-explain" onclick="explainUser()">Explain</button>
</div>

<!-- ── Chat Panel (right drawer) ──────────────────────── -->
<div id="chat-panel" class="chat-panel">
  <div class="chat-header">
    <div class="chat-title">
      <span class="chat-icon">&#x2728;</span>
      <span id="chat-user">User</span>
    </div>
    <button class="chat-close" onclick="closeChatPanel()">&times;</button>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-input-row">
    <input type="text" id="chat-input" placeholder="Ask about this user..." autocomplete="off" />
    <button id="chat-send" class="chat-send-btn">Send</button>
  </div>
  <div class="chat-footer">
    <span class="chat-model">mistral-medium-latest</span>
    <span id="chat-status" class="chat-status">idle</span>
  </div>
</div>

<div class="progress-container" id="progress">
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="progress-label">
    <span id="progress-date"></span>
    <span id="progress-count"></span>
  </div>
</div>

<!-- ── Leaderboard Overlay ────────────────────────────── -->
<div id="leaderboard-overlay" class="report-overlay">
  <div class="report-container" style="max-width:700px">
    <div class="report-topbar">
      <div class="report-topbar-title">&#x1F3C6; Leaderboard</div>
      <div class="report-topbar-actions">
        <button class="report-close-btn" onclick="deriveLeaderboard.close()">&times;</button>
      </div>
    </div>
    <div class="report-body" id="leaderboard-content"></div>
  </div>
</div>

<!-- ── Compare Overlay ───────────────────────────────── -->
<div id="compare-overlay" class="report-overlay">
  <div class="report-container" style="max-width:900px">
    <div class="report-topbar">
      <div class="report-topbar-title">&#x2696; Compare Users</div>
      <div class="report-topbar-actions">
        <button class="report-close-btn" onclick="deriveCompare.close()">&times;</button>
      </div>
    </div>
    <div class="report-body" id="compare-content"></div>
  </div>
</div>

<!-- ── Report Overlay ─────────────────────────────────── -->
<div id="report-overlay" class="report-overlay">
  <div class="report-container">
    <div class="report-topbar">
      <div class="report-topbar-title">&#x1F4CA; Data Analyst Report</div>
      <div class="report-topbar-actions">
        <button id="report-export-btn" class="report-export-btn" onclick="deriveReport.exportPDF()">Export PDF</button>
        <button class="report-close-btn" onclick="deriveReport.close()">&times;</button>
      </div>
    </div>
    <div class="report-body" id="report-content"></div>
  </div>
</div>

<!-- ── Scripts (order matters: dependencies first) ──────── -->
<script src="/static/js/map.js"></script>
<script src="/static/js/timeline.js"></script>
<script src="/static/js/animation.js"></script>
<script src="/static/js/chat.js"></script>
<script src="/static/js/report.js"></script>
<script src="/static/js/leaderboard.js"></script>
<script src="/static/js/compare.js"></script>
<script src="/static/js/app.js"></script>

</body>
</html>
